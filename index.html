<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>My project</title>
    <!-- Include the official Discord Embedded App SDK -->
    <script src="https://jsdelivr.net"></script>
  </head>
  <body>
    <div id="unity-container">
      <!-- Unity Canvas using template variable tags -->
      <canvas id="unity-canvas" width=960 height=600></canvas>
    </div>

    <script>
      // Initialize the Discord SDK (Replace with your actual ID from Discord Developer Portal)
      const discordSdk = new Discord.DiscordSDK("1524489022930419904");

      async function setupDiscord() {
        await discordSdk.ready();
        
        // Authorize with Discord to get user data and room channel context
        const { code } = await discordSdk.commands.authorize({
          client_id: "1524489022930419904",
          response_type: "code",
          state: "1",
          prompt: "none",
          scope: ["identify", "rpc.voice.read"],
        });

        // Forward the specific channel ID to Unity once it is running
        window.unityInstance.SendMessage('DiscordNetworkManager', 'SetDiscordContext', discordSdk.channelId);
      }

      // Tells Unity where to grab the compiled engine files during the build process
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/game v2.loader.js";
      var config = {
        dataUrl: buildUrl + "/game v2.data",
        frameworkUrl: buildUrl + "/game v2.framework.js",
        codeUrl: buildUrl + "/game v2.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project",
        productVersion: "0.1.0",
      };

      var canvas = document.querySelector("#unity-canvas");
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          // Optional loading bar code goes here
        }).then((instance) => {
          window.unityInstance = instance;
          setupDiscord(); // Boot up Discord functions after game engine loads
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
